- title: Research Experience
  type: time_table
  contents:
    - title: "GammaBot: Interfacial Flight of an Insect-Scale Robot"
      institution: Cornell University, Prof. E. Farrell Helbling
      year: 2022 - Present
      description:
        - Led end-to-end development of an untethered 961 mg flapping-wing robot for water-surface locomotion
        - Developed planar rigid-body dynamics with hydrodynamic drag and actuator thrust mapping
        - Implemented 679 Hz onboard EKF + feedforward/feedback PID control on STM32
        - Demonstrated 0.89 m/s forward speed, 400 deg/s turning, >10 min endurance
    - title: Compliant Thorax Design for Flapping-Wing Robots
      institution: UC San Diego, Prof. Nick Gravish
      year: 2021 - 2022
      description:
        - Designed compliant thorax/transmission mechanisms in SCM composites
        - Optimized wing frame to double flapping-robot lift-off payload to 8 g
    - title: Raibert-Control of Hopper Robot
      institution: UC San Diego, Prof. Nick Gravish
      year: 2021
      description:
        - Built 3D hopper URDF/PyBullet model for controller development
        - Implemented Raibert, PID, and LQR controllers for stable locomotion

